<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fitness Tracker{% endblock %} — Ivan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --accent: #7c4dff;
            --accent-soft: rgba(124, 77, 255, 0.15);
        }
        body { background: #0d1117; color: #c9d1d9; }
        .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
        .navbar-brand { font-weight: 700; color: var(--accent) !important; }
        .nav-link { color: #8b949e !important; transition: color 0.2s; }
        .nav-link:hover, .nav-link.active { color: #f0f6fc !important; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .card-header { background: transparent; border-bottom: 1px solid #30363d; font-weight: 600; }
        .stat-card { text-align: center; padding: 1.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
        .badge-muscle { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); font-weight: 500; }
        .table { --bs-table-bg: transparent; }
        .table th { color: #8b949e; font-weight: 600; border-color: #30363d; }
        .table td { border-color: #21262d; }
        .exercise-row:hover { background: rgba(124, 77, 255, 0.05); }
        .chart-container { position: relative; width: 100%; min-height: 300px; }
        .alert-success { background: rgba(63, 185, 80, 0.1); border-color: #3fb950; color: #3fb950; }
        .alert-warning { background: rgba(210, 153, 34, 0.1); border-color: #d29922; color: #d29922; }
        .alert-info { background: rgba(88, 166, 255, 0.1); border-color: #58a6ff; color: #58a6ff; }
        a { color: var(--accent); }
        a:hover { color: #a07eff; }
        .filter-btn { margin: 2px; }
        .session-card { transition: all 0.2s; cursor: pointer; }
        .session-card:hover { border-color: var(--accent); }
        .collapse-body { padding: 1rem; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">⚡ FitTrack</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/gym' in request.url.path %}active{% endif %}" href="/gym">Gym</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/cardio' in request.url.path %}active{% endif %}" href="/cardio">Cardio</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/recovery' in request.url.path %}active{% endif %}" href="/recovery">Recovery</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/advice' in request.url.path %}active{% endif %}" href="/advice">Advice</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-3 text-muted" style="border-top: 1px solid #30363d; font-size: 0.85rem;">
        Ivan's Fitness Tracker &middot; SQLite + FastAPI + Chart.js
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
